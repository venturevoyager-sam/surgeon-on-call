services:
  # ── BACKEND ────────────────────────────────────────────────────────────────
  - type: web
    name: surgeon-on-call-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      # Add SUPABASE_URL, SUPABASE_ANON_KEY, etc. manually in Render dashboard

  # ── HOSPITAL WEB ──────────────────────────────────────────────────────────
  - type: web
    name: surgeon-on-call-hospital
    runtime: static
    rootDir: hospital-web
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── DOCTOR WEB ──────────────────────────────────────────────────────────
  - type: web
    name: surgeon-on-call-doctor
    runtime: static
    rootDir: doctor-web
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html